language: php

php:
    - 7.2
    - 7.3
    - nightly

services:
    - redis-server

env:
    global:
        - secure: ""
        - secure: ""

matrix:
    fast_finish: true
    allow_failures:
        - php: nightly

cache:
    directories:
        - node_modules
        - vendor

before_install:
    - nvm install node && npm install -g yarn
    - google-chrome-stable --headless --disable-gpu --remote-debugging-port=9222 http://localhost &

install:
    - cp .env.example .env
    - echo "{\"http-basic\":{\"nova.laravel.com\":{\"username\":\"${NOVA_USERNAME}\",\"password\":\"${NOVA_PASSWORD}\"}}}" > auth.json
    - travis_retry composer self-update
    - travis_retry composer install -n --no-suggest --prefer-dist
    - php artisan key:generate
    - yarn
    - yarn dev

script:
    - php vendor/bin/phpunit
    - php artisan serve &
    - php artisan dusk
