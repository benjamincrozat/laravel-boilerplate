language: php

php:
    - 7.3

services:
    - mysql
    - redis-server

env:
    global:
        - secure: 
        - secure: 

matrix:
    fast_finish: true

cache:
    directories:
        - node_modules
        - vendor

before_install:
    - nvm install node && npm install -g yarn
    - mysql -e 'CREATE DATABASE laravel_boilerplate_test;'

install:
    - cp .env.travis .env
    - echo "{\"http-basic\":{\"nova.laravel.com\":{\"username\":\"${NOVA_USERNAME}\",\"password\":\"${NOVA_PASSWORD}\"}}}" > auth.json
    - travis_retry composer self-update
    - travis_retry composer install -n --no-suggest
    - travis_retry composer require predis/predis
    - php artisan key:generate
    - yarn
    - yarn dev

script:
    - php vendor/bin/phpunit
