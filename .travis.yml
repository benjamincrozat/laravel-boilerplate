
sudo: required

language: php

php:
    - 7.1
    - 7.2

services:
    - redis-server

addons:
    chrome: stable

cache:
    directories:
        - node_modules
        - vendor

before_install:
    - nvm install node
    - npm install -g yarn

install:
    - cp .env.example .env
    - composer install --n --no-suggest
    - php artisan key:generate
    - yarn
    - yarn dev

script:
    - php vendor/bin/phpunit
    - google-chrome-stable --headless --disable-gpu --remote-debugging-port=9222 http://localhost &
    - php artisan serve &
    - php artisan dusk
