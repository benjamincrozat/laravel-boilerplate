language: php

php:
    - 7.2

services:
    - redis-server

cache:
    directories:
        - node_modules
        - vendor

before_install:
    - nvm install node
    - npm install -g yarn

install:
    - cp .env.example .env
    - composer install -n --no-suggest
    - php artisan key:generate
    - yarn
    - yarn dev

script:
    - php vendor/bin/phpunit
